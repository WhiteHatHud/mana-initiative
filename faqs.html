<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQs — The Ma'na Initiative</title>
  <meta name="description" content="Frequently asked questions about The Ma'na Initiative — sessions, books, commitment, and how to join.">
  <link rel="canonical" href="https://mana-initiative.sg/faqs">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div id="nav-root"></div>
  <main id="main-content">
    <div class="page-header">
      <div class="container">
        <h1>Frequently Asked Questions</h1>
        <p>Everything you need to know before joining the circle.</p>
      </div>
    </div>

    <section class="section surface-cream">
      <div class="container">
        <div style="max-width:800px;">
          <!-- All FAQs loaded from database -->
          <div class="faq-list" id="dynamic-faqs">
            <p style="color:var(--muted);">Loading…</p>
          </div>

          <div style="margin-top:3rem; padding:2rem; background:var(--cream-2); border-radius:var(--radius-card); border:1px solid var(--border-light);">
            <h3 style="font-size:var(--text-xl);color:var(--forest);margin-bottom:.75rem;">Still have questions?</h3>
            <p style="color:var(--muted);margin-bottom:1.5rem;">We'd love to hear from you — reach out any time.</p>
            <a href="contact" class="btn btn-primary-forest">Get in touch</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/layout.js"></script>
  <script>
    function initAccordions(root) {
      root.querySelectorAll('.faq-question').forEach(btn => {
        btn.addEventListener('click', function () {
          const expanded = this.getAttribute('aria-expanded') === 'true';
          const answer   = document.getElementById(this.getAttribute('aria-controls'));
          if (!answer) return;
          this.setAttribute('aria-expanded', String(!expanded));
          answer.classList.toggle('open', !expanded);
        });
      });
    }

    document.addEventListener('DOMContentLoaded', async function () {
      const container = document.getElementById('dynamic-faqs');
      try {
        const faqs = await window.getFAQs();
        if (!faqs.length) {
          container.innerHTML = '<div class="empty-state"><p>No FAQs yet — check back soon.</p></div>';
          return;
        }
        container.innerHTML = faqs.map((f, i) => `
          <div class="faq-item">
            <button class="faq-question" aria-expanded="false" aria-controls="faq-d${i}">
              ${MANA.esc(f.question)}
              <svg class="faq-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="faq-answer" id="faq-d${i}" role="region">
              <div class="faq-answer-inner">${MANA.esc(f.answer)}</div>
            </div>
          </div>`).join('');
        initAccordions(container);
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p style="color:var(--error);">Could not load FAQs — please try refreshing.</p>';
      }
    });
  </script>
</body>
</html>
