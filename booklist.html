<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booklist — The Ma'na Initiative</title>
  <meta name="description" content="Books Ma'na has read, is reading, and plans to read. Islam, theology, Sufism, philosophy, and more.">
  <link rel="canonical" href="https://mana-initiative.sg/booklist">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="nav-root"></div>
  <main id="main-content">
    <div class="page-header">
      <div class="container">
        <h1>Booklist</h1>
        <p>Islam · theology · Sufism · philosophy · ethics · spirituality · secularism &amp; society — classical and contemporary.</p>
      </div>
    </div>

    <section class="section surface-cream">
      <div class="container">

        <!-- Filter bar -->
        <div style="display:flex;flex-wrap:wrap;gap:1.5rem;margin-bottom:2rem;" role="group" aria-label="Filter books">
          <div class="filter-group">
            <span class="filter-label">Status:</span>
            <button class="filter-btn active" data-status="all" aria-pressed="true">All</button>
            <button class="filter-btn" data-status="reading" aria-pressed="false">Reading</button>
            <button class="filter-btn" data-status="completed" aria-pressed="false">Completed</button>
            <button class="filter-btn" data-status="upcoming" aria-pressed="false">Upcoming</button>
          </div>
          <div class="filter-group">
            <span class="filter-label">Category:</span>
            <select class="form-select" id="category-filter" style="width:auto;min-width:160px;" aria-label="Filter by category">
              <option value="">All categories</option>
              <option>Theology</option>
              <option>Sufism</option>
              <option>Philosophy</option>
              <option>Ethics</option>
              <option>Spirituality</option>
              <option>Secularism &amp; Society</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <!-- Count line -->
        <p id="book-count" style="font-size:var(--text-sm);color:var(--muted);margin-bottom:1.5rem;"></p>

        <!-- Books grid -->
        <div id="books-grid" class="grid-books" role="list" aria-live="polite" aria-label="Books">
          <p style="color:var(--muted);">Loading books…</p>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/booklist.js" defer></script>
</body>
</html>
